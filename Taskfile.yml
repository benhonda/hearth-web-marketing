version: "3"

# https://taskfile.dev/usage/#output-syntax
output: prefixed

vars:
  AWS_PROFILE: "pharmer"

dotenv:
  - .env
  - .env.vercel

tasks:
  default:
    cmds:
      - task --list-all
  ########################################################################################################################
  #
  #                                        AWS commands (archived)
  #
  ########################################################################################################################
  login:
    requires:
      vars:
        - AWS_PROFILE
    vars:
      AWS_PROFILE: "{{.AWS_PROFILE}}"
    cmds:
      - aws sso login --profile {{.AWS_PROFILE}}

  check-aws-identity:
    requires:
      vars:
        - AWS_PROFILE
    vars:
      AWS_PROFILE: "{{.AWS_PROFILE}}"
    cmds:
      - |
        if ! aws sts get-caller-identity --profile {{.AWS_PROFILE}}; then
          echo ""
          echo "Your '{{.AWS_PROFILE}}' AWS profile is not logged in. Run 'task login' to log in."
          exit 1
        fi
    silent: true

  ########################################################################################################################
  #
  #                                        Lambda Build commands
  #
  ########################################################################################################################

  ########################################################################################################################
  #
  #                                        Docker / ECR commands
  #
  ########################################################################################################################

  ########################################################################################################################
  #
  #                                        Development commands
  #
  ########################################################################################################################

  # --------------------------------------------------------------------------------------------------------------------
  # Development server
  # --------------------------------------------------------------------------------------------------------------------
  start:
    aliases:
      - dev
    desc: Start development server
    interactive: true
    deps:
      - check-aws-identity
    dir: web
    cmds:
      - bun run dev

  install:
    desc: Install dependencies with Bun
    dir: web
    cmds:
      - bun install {{.CLI_ARGS}}

  # --------------------------------------------------------------------------------------------------------------------
  # Build commands
  # --------------------------------------------------------------------------------------------------------------------
  build:
    desc: Build the application
    dir: web
    cmds:
      - bun run build

  typecheck:
    desc: Run TypeScript type checking on app and all services
    aliases:
      - typecheck:all
    deps:
      - generate
    dir: web
    cmds:
      - bun run typecheck

  typecheck-app:
    desc: Run TypeScript type checking on main app only
    aliases:
      - typecheck:app
    dir: web
    cmds:
      - bun run typecheck

  # --------------------------------------------------------------------------------------------------------------------
  # Database commands
  # --------------------------------------------------------------------------------------------------------------------
  db-push:
    aliases:
      - push
      - drizzle-push
      - drizzle-kit-push
      - db:push
    desc: Push database schema changes to database
    interactive: true
    prompt: "Before pushing schema changes, double-check the DATABASE_URL - is it correct?"
    cmds:
      - bunx drizzle-kit push

  # --------------------------------------------------------------------------------------------------------------------
  # Testing commands
  # --------------------------------------------------------------------------------------------------------------------
  test:
    desc: Run all tests
    dir: web
    cmds:
      - bun test

